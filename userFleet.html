<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Fleet - AutoRent User</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="app.js"></script>
    <script>
        function toggleBooking(id, currentStatus) {
            const newStatus = currentStatus === 'available' ? 'booked' : 'available';
            updateVehicleStatus(id, newStatus);
            renderVehicles();
        }

        function renderVehicles() {
            const container = document.getElementById("vehicle-container");
            container.innerHTML = "";
            const vehicles = getVehicles();

            if(vehicles.length === 0) {
                container.innerHTML = "<div style='grid-column: 1 / -1; text-align:center; padding: 3rem; color: #64748B;'>We are currently out of stock. Please check back later.</div>";
                return;
            }

            vehicles.forEach(v => {
                const statusClass = v.status === "available" ? "available" : "booked";
                const iconClass = v.status === "available" ? "fa-solid fa-circle-check" : "fa-solid fa-circle-xmark";
                
                const card = document.createElement("div");
                card.className = "v-card";
                card.innerHTML = `
                    <div class='v-header'>
                        <div class='v-title'>${v.name}</div>
                        <span class='v-type'>${v.type}</span>
                    </div>
                    <div class='v-body'>
                        <div class='v-row' style='margin-bottom: 1.5rem;'>
                            <span style='color:var(--text-muted); font-weight:600;'>Availability:</span>
                            <span class='badge ${statusClass}'><i class='${iconClass}'></i> ${v.status}</span>
                        </div>
                        <div style='text-align:center; padding: 1.5rem 0; background:rgba(0,0,0,0.3); border-radius:12px; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05);'>
                            <div class='v-price'>$${v.price} <span>/ day</span></div>
                        </div>
                        
                        <div style="display:flex; gap: 10px; flex-direction: column;">
                            ${v.status === 'available' 
                                ? `<button onclick="toggleBooking(${v.id}, '${v.status}')" class='btn btn-success'><i class='fa-solid fa-key'></i> Reserve Vehicle Now</button>`
                                : `<button onclick="toggleBooking(${v.id}, '${v.status}')" class='btn' style='background: linear-gradient(135deg, #f59e0b, #d97706); color:#fff;'><i class='fa-solid fa-rotate-left'></i> Cancel My Reservation</button>`
                            }
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderVehicles;
    </script>
</head>
<body>
    
    <nav style="padding: 1.5rem 4rem; display: flex; justify-content: space-between; align-items: center;">
        <span class="brand" style="margin-bottom: 0; font-size: 1.5rem;"><i class="fa-solid fa-car-side"></i> AutoRental</span>
        <div style="display:flex; gap: 2rem;">
            <a href="userHome.html" style="color: #94A3B8; text-decoration: none; font-weight: 600;">Home Base</a>
            <a href="userFleet.html" style="color: #fff; text-decoration: none; font-weight: 600;">Fleet Gallery</a>
        </div>
        <a href="index.html" class="btn" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; width:auto; padding: 0.5rem 1rem;">Back to Portal</a>
    </nav>

    <main class="main-content" style="margin-left: 0; max-width: 1200px; margin: 0 auto;">
        <header class="top-header" style="background: transparent; border: none; padding: 0; margin-bottom: 2rem;">
            <div>
                <h1 class="page-title">Available Models</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Reserve your vehicle today perfectly simulated.</p>
            </div>
            <div class="user-profile">
                <span>VIP Customer</span>
                <img src="https://ui-avatars.com/api/?name=Customer&background=10B981&color=fff" alt="User">
            </div>
        </header>

        <section class="grid-3" id="vehicle-container">
            <!-- Data displays here -->
        </section>
    </main>

</body>
</html>
