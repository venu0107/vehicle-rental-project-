<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Overview - AutoRent Pro (Admin)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="app.js"></script>
    <script>
        function toggleBooking(id, currentStatus) {
            const newStatus = currentStatus === 'available' ? 'booked' : 'available';
            updateVehicleStatus(id, newStatus);
            renderVehicles();
        }

        function removeVehicle(id) {
            if(confirm("Are you sure you want to permanently DELETE this vehicle from the database?")) {
                deleteVehicle(id);
                renderVehicles();
                alert("Vehicle Deleted Successfully!");
            }
        }

        function renderVehicles() {
            const container = document.getElementById("vehicle-container");
            container.innerHTML = "";
            const vehicles = getVehicles();

            if(vehicles.length === 0) {
                container.innerHTML = "<div style='grid-column: 1 / -1; text-align:center; padding: 3rem; color: #64748B;'>No vehicles found in database. Please Add a Vehicle.</div>";
                return;
            }

            vehicles.forEach(v => {
                const statusClass = v.status === "available" ? "available" : "booked";
                const iconClass = v.status === "available" ? "fa-solid fa-circle-check" : "fa-solid fa-circle-xmark";
                
                const card = document.createElement("div");
                card.className = "v-card";
                card.innerHTML = `
                    <div class='v-header'>
                        <div class='v-title'>${v.name} <i class='fa-solid fa-car-rear' style='color:#CBD5E1'></i></div>
                        <span class='v-type'>${v.type}</span>
                    </div>
                    <div class='v-body'>
                        <div class='v-row'>
                            <span style='color:var(--text-muted); font-weight:600;'>System ID:</span>
                            <span style='font-family:monospace; background:#e2e8f0; color:#0F172A; padding:2px 8px; border-radius:4px;'>#${v.id}</span>
                        </div>
                        <div class='v-row' style='margin-bottom: 1.5rem;'>
                            <span style='color:var(--text-muted); font-weight:600;'>Database State:</span>
                            <span class='badge ${statusClass}'><i class='${iconClass}'></i> ${v.status}</span>
                        </div>
                        <div style='text-align:center; padding: 1.5rem 0; background:rgba(0,0,0,0.3); border-radius:12px; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05);'>
                            <div class='v-price'>$${v.price} <span>/ day</span></div>
                        </div>
                        
                        <div style="display:flex; gap: 10px; flex-direction: column;">
                            ${v.status === 'available' 
                                ? `<button onclick="toggleBooking(${v.id}, '${v.status}')" class='btn btn-success'><i class='fa-solid fa-key'></i> Reserve Vehicle</button>`
                                : `<button onclick="toggleBooking(${v.id}, '${v.status}')" class='btn' style='background:#f59e0b; color:#111827;'><i class='fa-solid fa-rotate-left'></i> Cancel Reserve</button>`
                            }
                            <button onclick="removeVehicle(${v.id})" class='btn' style='background:#fee2e2; color:#991b1b; border: 1px solid #fca5a5;'><i class='fa-solid fa-trash-can'></i> Delete Permanently</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderVehicles;
    </script>
</head>
<body>

    <aside class="sidebar">
        <a href="index.html" class="brand">
            <i class="fa-solid fa-car-side"></i> AutoRental Admin
        </a>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-layer-group"></i> Dashboard Options</a></li>
            <li><a href="viewVehicles.html" class="active"><i class="fa-solid fa-car"></i> Manage Fleet</a></li>
            <li><a href="addVehicle.html"><i class="fa-solid fa-square-plus"></i> Add Vehicle</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div>
                <h1 class="page-title">Admin Fleet Manager</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">You have full Admin privileges (Create, Read, Update, Delete).</p>
            </div>
            <div class="user-profile">
                <span>System Admin</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=4F46E5&color=fff" alt="User">
            </div>
        </header>

        <section class="grid-3" id="vehicle-container">
            <!-- Data displays here -->
        </section>
    </main>

</body>
</html>
